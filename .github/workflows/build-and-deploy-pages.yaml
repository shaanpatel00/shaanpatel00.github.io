name: build-and-deploy-pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  id-token: write  # This grants the necessary id-token permission
  contents: read   # This is the default permission for reading repo contents
  pages: write     # This grants the necessary pages permission
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build  # Adjust if your build command is different
        env: 
          CI: false


      - name: Upload Artifacts
        id: deployment
        uses: actions/upload-pages-artifact@v6 # or specific "vX.X.X" version tag for this action
        with:
          path: ./build
          
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5